<!doctype html>
<html lang="lo">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kennyXpay — ທົດສອບ Barcode Scanner</title>
  <style>
    body{font-family:"Noto Sans Lao",Arial,sans-serif;background:#f3f6fb;margin:0;min-height:100vh;display:grid;place-items:center;color:#14213d}
    main{width:min(720px,92vw);background:white;border:1px solid #dfe6f2;border-radius:18px;padding:28px;box-shadow:0 12px 40px #1232}
    h1{margin:0 0 8px;font-size:28px}
    p{color:#607089}
    input{width:100%;font-size:28px;padding:18px;border:2px solid #4f6fe9;border-radius:14px;box-sizing:border-box;outline:none}
    .ok{margin-top:16px;background:#e9fff4;color:#16794f;border:1px solid #9be7c3;border-radius:12px;padding:14px;font-size:18px}
    .log{margin-top:18px;display:grid;gap:8px}
    .item{background:#f7f9fd;border:1px solid #e1e7f2;border-radius:10px;padding:10px 12px}
    kbd{background:#eef2ff;border:1px solid #cdd8ff;border-radius:6px;padding:2px 7px;color:#3154d5}
  </style>
</head>
<body>
  <main>
    <h1>ທົດສອບ Barcode Scanner</h1>
    <p>ໜ້ານີ້ຈະຈັບສັນຍານ scanner ທົ່ວໜ້າຈໍ. ກົດປຸ່ມ scanner ແລ້ວສະແກນ barcode. ຖ້າເຄື່ອງເຮັດວຽກ ລະຫັດຈະໂຊທີ່ນີ້ ແລະກົດ <kbd>Enter</kbd> ເອງ.</p>
    <input id="scan" autofocus placeholder="ສະແກນ barcode ທີ່ນີ້..." autocomplete="off" />
    <div id="status" class="ok">ພ້ອມສະແກນ...</div>
    <div id="log" class="log"></div>
  </main>
  <script>
    const scan = document.getElementById('scan')
    const status = document.getElementById('status')
    const log = document.getElementById('log')
    let buffer = ''
    let timer = null
    const focusScan = () => scan.focus()
    window.addEventListener('click', focusScan)
    window.addEventListener('focus', focusScan)
    setInterval(focusScan, 800)
    const addResult = (value) => {
      status.textContent = `✅ ຮັບ barcode ແລ້ວ: ${value}`
      const item = document.createElement('div')
      item.className = 'item'
      item.textContent = `${new Date().toLocaleTimeString()} — ${value}`
      log.prepend(item)
      scan.value = ''
      buffer = ''
    }
    window.addEventListener('keydown', (event) => {
      if (timer) clearTimeout(timer)
      if (event.key === 'Enter') {
        const value = (scan.value || buffer).trim()
        if (!value) return
        addResult(value)
        return
      }
      if (event.key.length === 1) {
        buffer += event.key
        scan.value = buffer
        status.textContent = `ກຳລັງຮັບ: ${buffer}`
        timer = setTimeout(() => {
          if (buffer.trim()) status.textContent = `⚠️ ໄດ້ຕົວອັກສອນແຕ່ບໍ່ມີ Enter: ${buffer}`
        }, 600)
      }
    })
  </script>
</body>
</html>
